{% extends "expenses/base_app.html" %}
{% block title %}Add Income{% endblock %}
{% block content %}
<h2 class="mb-4">Add Income</h2>
<p class="text-muted">Use <strong>Salary</strong> or <strong>Opening Balance</strong> as the source when starting.</p>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Source</label>
        <input type="text" name="source" class="form-control" placeholder="e.g. Salary, Opening Balance" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount" class="form-control" required>
    </div>
    <button class="btn btn-success">Save Income</button>
    <a href="{% url 'dashboard' %}" class="btn btn-outline-light">Back</a>
</form>
{% endblock %}
