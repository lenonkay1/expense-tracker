{% extends "expenses/base_app.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<h2 class="mb-4">Add New Expense</h2>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Expense Title</label>
        <select id="titleSelect" name="title" class="form-select" required>
            <option value="">-- Select Expense Title --</option>
            <option value="Groceries">Groceries</option>
            <option value="Fuel">Fuel</option>
            <option value="Rent">Rent</option>
            <option value="Electricity Bill">Electricity Bill</option>
            <option value="Internet">Internet</option>
            <option value="Clothing">Clothing</option>
            <option value="Medical">Medical</option>
            <option value="Snacks & Drinks">Snacks & Drinks</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Expense Category</label>
        <select id="categorySelect" name="category" class="form-select" required>
            <option value="">-- Select Category --</option>
            <option value="Home">Home</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Bills">Bills</option>
            <option value="School">School</option>
            <option value="Health">Health</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Personal">Personal</option>
            <option value="Savings">Savings</option>
            <option value="Other">Other</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Notes (optional)</label>
        <textarea name="notes" class="form-control" rows="2" placeholder="Add a short note"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{% url 'dashboard' %}" class="btn btn-outline-light">Back</a>
</form>
{% endblock %}
{% block extra_head %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    const categoryMap = {
        "Groceries": "Food", "Fuel": "Transport", "Rent": "Home",
        "Electricity Bill": "Bills", "Internet": "Bills", "Clothing": "Personal",
        "Medical": "Health", "Snacks & Drinks": "Food", "Transport": "Transport",
        "Entertainment": "Entertainment"
    };
    document.getElementById("titleSelect").addEventListener("change", function () {
        const auto = categoryMap[this.value];
        if (auto) document.getElementById("categorySelect").value = auto;
    });
});
</script>
{% endblock %}
