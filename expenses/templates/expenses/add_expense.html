<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">
<div class="container">
    <h2>Add New Expense</h2>
    <form method="POST">
        {% csrf_token %}

        <!-- Title Dropdown -->
        <div class="mb-3">
            <label>Expense Title:</label>
            <select id="titleSelect" name="title" class="form-select" required>
                <option value="">-- Select Expense Title --</option>
                <option value="Groceries">Groceries</option>
                <option value="Fuel">Fuel</option>
                <option value="Rent">Rent</option>
                <option value="Electricity Bill">Electricity Bill</option>
                <option value="Internet">Internet</option>
                <option value="Clothing">Clothing</option>
                <option value="Medical">Medical</option>
                <option value="Snacks & Drinks">Snacks & Drinks</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
                <option value="Help">Help</option>
            </select>
        </div>

        <!-- Category Dropdown -->
        <div class="mb-3">
            <label>Expense Category:</label>
            <select id="categorySelect" name="category" class="form-select" required>
                <option value="">-- Select Category --</option>
                <option value="Home">Home</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="School">School</option>
                <option value="Health">Health</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Personal">Personal</option>
                <option value="Savings">Savings</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <!-- Amount -->
        <div class="mb-3">
            <label>Amount:</label>
            <input type="number" step="0.01" name="amount" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back</a>
    </form>
</div>

<!-- ⭐ Add script RIGHT BEFORE </body> ⭐ -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    const categoryMap = {
        "Groceries": "Food",
        "Fuel": "Transport",
        "Rent": "Home",
        "Electricity Bill": "Bills",
        "Internet": "Bills",
        "Clothing": "Personal",
        "Medical": "Health",
        "Snacks & Drinks": "Food",
        "Transport": "Transport",
        "Entertainment": "Entertainment"
    };

    const titleSelect = document.getElementById("titleSelect");
    const categorySelect = document.getElementById("categorySelect");

    titleSelect.addEventListener("change", function () {
        const selectedTitle = this.value;
        const autoCategory = categoryMap[selectedTitle];

        if (autoCategory) {
            categorySelect.value = autoCategory;
        }
    });

});
</script>


</body>
</html>
