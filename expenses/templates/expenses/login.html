<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6f5f95 0%, #b9b6c7 45%, #5b4a80 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            background: #f5f5f5;
            border-radius: 40px;
            padding: 70px 36px 36px;
            box-shadow: 0 14px 40px rgba(20, 16, 35, 0.25);
            position: relative;
        }

        .icon-wrapper {
            position: absolute;
            top: -58px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .icon-wrapper svg {
            width: 54px;
            height: 54px;
            color: #5e4a80;
        }

        .input-row {
            display: flex;
            margin-bottom: 16px;
            border-radius: 0;
            overflow: hidden;
        }

        .input-icon {
            width: 72px;
            background: #d4d4d4;
            color: #575757;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .input-row input {
            border: 0;
            border-radius: 0;
            height: 58px;
            background: #c3c3c3;
            color: #333;
            font-size: 1.1rem;
        }

        .input-row input:focus {
            box-shadow: none;
            background: #bebebe;
        }

        .action-btn {
            height: 62px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.15rem;
            color: #fff;
            background: #5e4a80;
        }

        .action-btn:hover {
            background: #554174;
            color: #fff;
        }

        .separator {
            margin: 24px 0;
            border-top: 1px solid #bababa;
        }

        .error-box {
            border-radius: 10px;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="icon-wrapper" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7h4l2-2h6l2 2h4v12H3z"></path>
            <circle cx="12" cy="13" r="3"></circle>
        </svg>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger error-box">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-row">
            <div class="input-icon">👤</div>
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="input-row">
            <div class="input-icon">🔒</div>
            <input type="password" name="password" class="form-control" placeholder="************" required>
        </div>

        <button type="submit" class="btn action-btn w-100 mt-3">Login</button>
        <div class="separator"></div>
        <a href="{% url 'register' %}" class="btn action-btn w-100">Get Registered</a>
    </form>
</div>
</body>
</html>
