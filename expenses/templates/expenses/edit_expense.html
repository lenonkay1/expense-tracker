<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">

<div class="container">
    <h2>Edit Expense</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Title</label>
            <select name="title" class="form-select">
                {% for key, value in expense.TITLE_CHOICES %}
                    <option value="{{ key }}" {% if expense.title == key %}selected{% endif %}>
                        {{ value }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <select name="category" class="form-select">
                {% for key, value in expense.CATEGORY_CHOICES %}
                    <option value="{{ key }}" {% if expense.category == key %}selected{% endif %}>
                        {{ value }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

</body>
</html>
