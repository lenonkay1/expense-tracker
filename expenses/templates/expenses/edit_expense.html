{% extends "expenses/base_app.html" %}
{% block title %}Edit Expense{% endblock %}
{% block content %}
<h2 class="mb-4">Edit Expense</h2>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Title</label>
        <select name="title" class="form-select">
            {% for key, value in title_choices %}
            <option value="{{ key }}" {% if expense.title == key %}selected{% endif %}>{{ value }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
            {% for key, value in category_choices %}
            <option value="{{ key }}" {% if expense.category == key %}selected{% endif %}>{{ value }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2">{{ expense.notes }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{% url 'dashboard' %}" class="btn btn-outline-light">Cancel</a>
</form>
{% endblock %}
